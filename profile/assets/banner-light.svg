<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="terrainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a3a2e" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#2d5a3f" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4a7c59" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="terrainGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5a3f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6b9a7a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="terrainGradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a7c59" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a8c5a0" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="#fafaf7"/>

  <!-- Geometric mark: stacked contour-like curves suggesting terrain / data layers -->
  <g transform="translate(140, 160)">
    <!-- Layer 1 (back) -->
    <path d="M 0 30 Q 30 -10, 70 15 T 140 20 T 200 5 L 200 80 L 0 80 Z"
          fill="url(#terrainGradient3)"/>
    <!-- Layer 2 (middle) -->
    <path d="M 0 50 Q 35 20, 75 35 T 145 30 T 200 40 L 200 80 L 0 80 Z"
          fill="url(#terrainGradient2)"/>
    <!-- Layer 3 (front) -->
    <path d="M 0 65 Q 40 45, 80 55 T 150 50 T 200 60 L 200 80 L 0 80 Z"
          fill="url(#terrainGradient)"/>
    <!-- Subtle dot — represents a data point on the terrain -->
    <circle cx="110" cy="42" r="3" fill="#1a3a2e"/>
  </g>

  <!-- Wordmark: DiCRA in serif display type -->
  <text x="420" y="180"
        font-family="'Cormorant Garamond', 'EB Garamond', 'Playfair Display', Georgia, serif"
        font-size="140"
        font-weight="500"
        letter-spacing="-2"
        fill="#1a1a1a">DiCRA</text>

  <!-- Subtle rule beneath wordmark -->
  <line x1="420" y1="210" x2="900" y2="210" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>

  <!-- Tagline in small caps -->
  <text x="420" y="235"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="13"
        font-weight="500"
        letter-spacing="4"
        fill="#1a3a2e">DATA &#8231; IN &#8231; CLIMATE &#8231; RESILIENT &#8231; AGRICULTURE</text>
</svg>
